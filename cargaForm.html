<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Carga</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="main.css">
  <!-- Favicons -->
  <link href="assets/img/logo.png" rel="icon">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Raleway:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Vendor CSS Files -->
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/vendor/aos/aos.css" rel="stylesheet">
  <link href="assets/vendor/glightbox/css/glightbox.min.css" rel="stylesheet">
  <link href="assets/vendor/swiper/swiper-bundle.min.css" rel="stylesheet">

  <!-- Main CSS File -->
  <link href="assets/css/main.css" rel="stylesheet">

  <style>
        body {
        background-image: url('./assets/img/hero-bg.jpg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        background-repeat: no-repeat;
        padding: 20px;
        position: relative;
        min-height: 100vh;
        }
  </style>
</head>
<body>
    <a class="cta-btn" href="adminUser.html">Atrás</a>
    <div class="container-ConduForm">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="form-container">
                    <div class="form-header">
                        <h2><i class="fas fa-user-edit me-2"></i>Formulario de Registro - <span style="color: var(--accent-color);">Carga</span></h2>
                    </div>
                    <form>
                        <div class="row mb-4">
                            <div class="col-md-12">
                                <label for="descripcion-carga" class="form-label">Descripción</label>
                                <input type="text" class="form-control" id="descripcion-carga" placeholder="Ingrese la descripción de la carga">
                            </div>
                        </div>
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label for="peso-carga" class="form-label">Peso</label>
                                <input type="number" class="form-control" id="peso-carga" placeholder="Ingrese el peso de la carga" required>
                            </div>
                            <div class="col-md-6">
                                <label for="cliente-carga" class="form-label">Cliente</label>
                                <select class="form-select" id="cliente-carga" required>
                                    <option value="" selected disabled>Seleccione una opción</option>
                                </select>
                            </div>
                        </div>
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label for="vehiculo-carga" class="form-label">Vehículo</label>
                                <select class="form-select" id="vehiculo-carga" required>
                                    <option value="" selected disabled>Seleccione una opción</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="conductor-carga" class="form-label">Conductor</label>
                                <select class="form-select" id="conductor-carga" required>
                                    <option value="" selected disabled>Seleccione una opción</option>
                                </select>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label for="fecha-inicio-carga" class="form-label">Fecha inicio de la carga</label>
                                <input type="date" class="form-control" id="fecha-inicio-carga" required>
                            </div>
                            <div class="col-md-6">
                                <label for="fecha-fin-carga" class="form-label">Fecha fin de la carga</label>
                                <input type="date" class="form-control" id="fecha-fin-carga" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="foto-carga" class="form-label">Foto de Carga</label>
                            <div class="file-upload">
                                <label for="foto-carga" class="custom-file-upload">
                                    <i class="fas fa-cloud-upload-alt"></i> Seleccionar foto
                                </label>
                                <input type="file" id="foto-carga" accept="image/*">
                            </div>
                            <img id="previewImgCarga" class="preview-image" src="" alt="Vista previa">
                        </div>

                        <div class="d-flex justify-content-between mt-5">
                            <button type="reset" class="btn btn-secondary">
                                <i class="fas fa-times me-2"></i>Cancelar
                            </button>
                            <button type="submit" class="btn" style="background-color: var(--accent-color); color: var(--contrast-color);">
                                <i class="fas fa-save me-2"></i>Guardar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
