<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Conductor</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="main.css">
  <!-- Favicons -->
  <link href="assets/img/logo.png" rel="icon">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Raleway:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Vendor CSS Files -->
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/vendor/aos/aos.css" rel="stylesheet">
  <link href="assets/vendor/glightbox/css/glightbox.min.css" rel="stylesheet">
  <link href="assets/vendor/swiper/swiper-bundle.min.css" rel="stylesheet">

  <!-- Main CSS File -->
  <link href="assets/css/main.css" rel="stylesheet">

  <style>
        body {
        background-image: url('./assets/img/hero-bg.jpg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        background-repeat: no-repeat;
        padding: 20px;
        position: relative;
        min-height: 100vh;
        }
  </style>
</head>
<body>
    <a class="cta-btn" href="adminUser.html">Atrás</a>
    <div class="container-ConduForm">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="form-container">
                    <div class="form-header">
                        <h2><i class="fas fa-user-edit me-2"></i>Formulario de Registro - <span style="color: var(--accent-color);">Conductor</span></h2>
                    </div>
                    <form>
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label for="tipoDocumento" class="form-label">Tipo de documento</label>
                                <select class="form-select" id="tipoDocumento" required>
                                    <option value="" selected disabled>Seleccione una opción</option>
                                    <option value="cedula">Cédula de Ciudadanía</option>
                                    <option value="pasaporte">Pasaporte</option>
                                    <option value="tarjeta">Tarjeta de Identidad</option>
                                    <option value="extranjeria">Cédula de Extranjería</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="documento" class="form-label">Número de documento</label>
                                <input type="text" class="form-control" id="documento" placeholder="Ingrese el número de documento" required>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label for="nombres-conductor" class="form-label">Nombre(s)</label>
                                <input type="text" class="form-control" id="nombres-conductor" placeholder="Ingrese su(s) nombre(s)" required>
                            </div>
                            <div class="col-md-6">
                                <label for="apellidos-conductor" class="form-label">Apellido(s)</label>
                                <input type="text" class="form-control" id="apellidos-conductor" placeholder="Ingrese su(s) apellido(s)" required>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label for="correo-conductor" class="form-label">Correo electrónico</label>
                                <input type="email" class="form-control" id="correo-conductor" placeholder="correo@ejemplo.com" required>
                            </div>
                            <div class="col-md-6">
                                <label for="telefono" class="form-label">Teléfono</label>
                                <input type="tel" class="form-control" id="telefono" placeholder="Ingrese su número telefónico" required>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label for="ciudad" class="form-label">Ciudad</label>
                                <input type="text" class="form-control" id="ciudad" placeholder="Ingrese su ciudad" required>
                            </div>
                            <div class="col-md-6">
                                <label for="direccion" class="form-label">Dirección</label>
                                <input type="text" class="form-control" id="direccion" placeholder="Ingrese su dirección" required>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label for="tipoLicencia" class="form-label">Tipo de licencia</label>
                                <select class="form-select" id="tipoLicencia" required>
                                    <option value="" selected disabled>Seleccione una opción</option>
                                    <option value="A1">A1 - Motocicletas</option>
                                    <option value="A2">A2 - Motocicletas</option>
                                    <option value="B1">B1 - Automóviles</option>
                                    <option value="B2">B2 - Camiones</option>
                                    <option value="C1">C1 - Vehículos pesados</option>
                                    <option value="C2">C2 - Buses</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="fechaVencimientoLicencia" class="form-label">Fecha de vencimiento</label>
                                <input type="date" class="form-control" id="fechaVencimientoLicencia" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="foto" class="form-label">Foto de Perfil</label>
                            <div class="file-upload">
                                <label for="foto-perfil" class="custom-file-upload">
                                    <i class="fas fa-cloud-upload-alt"></i> Seleccionar foto
                                </label>
                                <input type="file" id="foto-perfil" accept="image/*">
                            </div>
                            <img id="previewImg" class="preview-image" src="" alt="Vista previa">
                        </div>

                        <div class="d-flex justify-content-between mt-5">
                            <button type="reset" class="btn btn-secondary">
                                <i class="fas fa-times me-2"></i>Cancelar
                            </button>
                            <button type="submit" class="btn" style="background-color: var(--accent-color); color: var(--contrast-color);">
                                <i class="fas fa-save me-2"></i>Guardar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
